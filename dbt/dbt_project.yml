name: 'ecommerce_pipeline'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_pipeline'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_pipeline:
    bronze:
      +materialized: view
      +schema: bronze
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: incremental
      +schema: gold
      +incremental_strategy: merge

seeds:
  ecommerce_pipeline:
    +schema: seeds

vars:
  usd_exchange_rates:
    USD: 1.00
    EUR: 1.08
    GBP: 1.26
    BRL: 0.19
    CAD: 0.74
    AUD: 0.65
    JPY: 0.0066
    MXN: 0.057
